---
- name: Stop and disable wuauserv service
  ansible.windows.win_service:
    name: wuauserv
    state: stopped
    start_mode: disabled

- name: Disable Automatic Reboot for Updates via Registry
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU
    name: NoAutoRebootWithLoggedOnUsers
    data: 1
    type: dword
    state: present

- name: Disable Windows Licensing Monitoring Service (WLMS)
  ansible.windows.win_service:
    name: WLMS
    start_mode: disabled
    state: stopped
  ignore_errors: yes

- name: Abort any pending shutdowns
  ansible.windows.win_shell: shutdown /a
  register: shutdown_abort_result
  changed_when: false
  failed_when: false

- name: Set Network Profile to Private
  ansible.windows.win_shell: |
    $Profile = Get-NetConnectionProfile
    if ($Profile.NetworkCategory -ne 'Private') {
        Set-NetConnectionProfile -NetworkCategory Private
    }
  register: profile_change
  changed_when: profile_change.stdout != ""

- name: Enable RDP and disable NLA
  ansible.windows.win_regedit:
    path: "{{ item.path }}"
    name: "{{ item.name }}"
    data: 0
    type: dword
    state: present
  loop:
    - { path: 'HKLM:\System\CurrentControlSet\Control\Terminal Server', name: 'fDenyTSConnections' }
    - { path: 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp', name: 'UserAuthentication' }

- name: Allow Ping (ICMPv4)
  community.windows.win_firewall_rule:
    name: Allow ICMPv4-In
    protocol: icmpv4
    action: allow
    direction: in
    enabled: yes
    state: present

- name: Ensure Firewall allows RDP and WinRM
  ansible.windows.win_shell: |
    Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
    Enable-NetFirewallRule -DisplayGroup "Windows Remote Management"
  failed_when: false

- name: Open Firewall Ports Explicitly (WinRM and RDP)
  community.windows.win_firewall_rule:
    name: "Ansible-{{ item.name }}"
    localport: "{{ item.port }}"
    action: allow
    direction: in
    protocol: tcp
    state: present
  loop:
    - { name: 'WinRM-HTTP', port: '5985' }
    - { name: 'WinRM-HTTPS', port: '5986' }
    - { name: 'RDP', port: '3389' }

- name: Completely Disable Firewall
  community.windows.win_firewall:
    state: disabled
    profiles:
      - Domain
      - Private
      - Public

- name: Change Windows User Password
  ansible.windows.win_user:
    name: windows
    password: "qwerty!23"
    state: present
    password_never_expires: yes
    update_password: always
