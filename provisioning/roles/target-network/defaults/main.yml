---
target_network_compose_dir: /opt/target-network
target_network_compose_file: /opt/target-network/docker-compose.yml

# DVWA (Application Servers layer)
target_network_dvwa_port: 80
target_network_dvwa_db_password: dvwa_lab_pass

# MariaDB exposed (Databases layer misconfiguration)
target_network_mariadb_port: 3306

# phpMyAdmin - database admin panel exposed (Databases layer misconfiguration)
target_network_phpmyadmin_port: 8080

# Core Services nginx portal (Application Servers / Core Services layer)
target_network_core_services_port: 8443

# DVWA application credentials (default shipped with image)
target_network_dvwa_admin_user: admin
target_network_dvwa_admin_password: password

# SSH weak credentials (Management access misconfiguration)
target_network_ssh_port: 22
target_network_ssh_weak_user: labuser
target_network_ssh_weak_password: "labuser"

target_network_healthcheck:
  url: "http://127.0.0.1:{{ target_network_dvwa_port }}/setup.php"
  status_code: 200
  timeout: 60
  retries: 10
  delay: 6

target_network_phpmyadmin_healthcheck:
  url: "http://127.0.0.1:{{ target_network_phpmyadmin_port }}/"
  status_code: 200
  timeout: 30
  retries: 5
  delay: 6
